name: Validate

on:
  push:
  pull_request:

jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          manifest = json.loads((root / "plugin.json").read_text())

          required = [
              "id",
              "name",
              "description",
              "version",
              "author",
              "type",
              "capabilities",
              "component",
          ]
          missing = [key for key in required if key not in manifest]
          if missing:
              print(f"missing required manifest fields: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          if not re.fullmatch(r"[A-Za-z][A-Za-z0-9]*", manifest["id"]):
              print("manifest id must be camelCase without spaces", file=sys.stderr)
              sys.exit(1)

          if not re.fullmatch(r"\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?", manifest["version"]):
              print("manifest version must be semantic version format", file=sys.stderr)
              sys.exit(1)

          component = manifest["component"]
          if not component.startswith("./") or not component.endswith(".qml"):
              print("manifest component must be a relative QML path", file=sys.stderr)
              sys.exit(1)

          component_path = root / component[2:]
          if not component_path.is_file():
              print(f"component path does not exist: {component}", file=sys.stderr)
              sys.exit(1)
          PY
